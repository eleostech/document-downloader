version: 2.1

orbs:
  windows: circleci/windows@5.0

jobs:
  powershell-5-unit-tests:
    executor:
      name: windows/default
      size: "medium"
    steps:
      - checkout
      - run:
          name: "Install Pester 5 and Run Unit Tests"
          shell: powershell.exe
          command: |
            $ProgressPreference = 'SilentlyContinue'
            Write-Host "Setting up Pester 5..."
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
            Install-Module -Name Pester -Repository PSGallery -Force -SkipPublisherCheck -MaximumVersion 5.9.9 -Scope CurrentUser
            Import-Module Pester -MinimumVersion 5.0.0 -Force
            Write-Host "Using Pester version: $((Get-Module Pester).Version)"
            $pesterResult = Invoke-Pester -Path ./Tests/doc-downloader.Unit.Tests.ps1 -Output Detailed -PassThru
            if ($pesterResult.FailedCount -gt 0) {
                Write-Error "Unit tests failed!"
                exit 1
            }

  powershell-5-integration-tests:
    executor:
      name: windows/default
      size: "medium"
    steps:
      - checkout
      - run:
          name: "Build Mock Server and Run Integration Tests"
          shell: powershell.exe
          command: |
            $ProgressPreference = 'SilentlyContinue'
            Write-Host "Setting up Pester 5..."
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
            Install-Module -Name Pester -Repository PSGallery -Force -SkipPublisherCheck -MaximumVersion 5.9.9 -Scope CurrentUser
            Import-Module Pester -MinimumVersion 5.0.0 -Force
            Write-Host "Using Pester version: $((Get-Module Pester).Version)"
            docker build -t mock-server -f MockServer/Dockerfile .
            docker run -d --name mock-server -p 5000:80 -e ASPNETCORE_URLS=http://+:80 mock-server
            try {
                Write-Host "Waiting for mock server..."
                $ready = $false
                $maxAttempts = 30
                $attempts = 0
                while (-not $ready -and $attempts -lt $maxAttempts) {
                    try {
                        $response = Invoke-WebRequest -Uri "http://localhost:5000/api/v1/documents/queued/next" -ErrorAction SilentlyContinue
                        $ready = $true
                    } catch {
                        Start-Sleep -Seconds 2
                        $attempts++
                    }
                }
                if (-not $ready) {
                    throw "Mock server failed to start in time."
                }
                Write-Host "Mock server is ready. Running tests..."
                $pesterResult = Invoke-Pester -Path ./Tests/doc-downloader.Integration.Tests.ps1 -Output Detailed -PassThru
                if ($pesterResult.FailedCount -gt 0) {
                    Write-Error "Tests failed!"
                    exit 1
                }
            }
            finally {
                docker rm -f mock-server
            }

  powershell-6-unit-tests:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: "Run PowerShell 6 Unit Tests"
          command: |
            docker compose up unit-ps6 --build --exit-code-from unit-ps6

  powershell-7-unit-tests:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: "Run PowerShell 7 Unit Tests"
          command: |
            docker compose up unit-ps7 --build --exit-code-from unit-ps7

  powershell-6-integration-tests:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: "Run PowerShell 6 Integration Tests"
          command: |
            docker compose up test-ps6 --build --exit-code-from test-ps6

  powershell-7-integration-tests:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: "Run PowerShell 7 Integration Tests"
          command: |
            docker compose up test-ps7 --build --exit-code-from test-ps7

workflows:
  verify:
    jobs:
      - powershell-5-unit-tests
      - powershell-5-integration-tests
      - powershell-6-unit-tests
      - powershell-7-unit-tests
      - powershell-6-integration-tests
      - powershell-7-integration-tests
