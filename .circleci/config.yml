version: 2.1

orbs:
  windows: circleci/windows@5.0

jobs:
  test-ps5:
    executor:
      name: windows/default
      size: "medium"
    steps:
      - checkout
      - run:
          name: "Run PowerShell 5.1 Tests"
          shell: powershell.exe
          command: |
            # Try to find docker-compose or use docker compose
            if (Get-Command "docker-compose" -ErrorAction SilentlyContinue) {
                $cmd = "docker-compose"
            } else {
                $cmd = "docker compose"
            }
            Write-Host "Using command: $cmd"
            & $cmd -f docker-compose.versions.yml up --build --exit-code-from downloader-ps5 downloader-ps5

  test-ps6:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: "Run PowerShell 6 Tests"
          command: ./run-version-tests.sh downloader-ps6

  test-ps7:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: "Run PowerShell 7 Tests"
          command: ./run-version-tests.sh downloader-ps7

workflows:
  verify:
    jobs:
      - test-ps5
      - test-ps6
      - test-ps7
