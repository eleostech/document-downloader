version: 2.1

orbs:
  windows: circleci/windows@5.0

jobs:
  test-ps5:
    executor:
      name: windows/default
      size: "medium"
    steps:
      - checkout
      - run:
          name: "Run PowerShell 5.1 Tests"
          shell: powershell.exe
          command: |
            $composePath = Get-Command "docker-compose" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
            if (-not $composePath) {
                $paths = @(
                    "C:\Program Files\Docker\Docker\resources\bin\docker-compose.exe",
                    "C:\Program Files\Docker\docker-compose.exe",
                    "C:\ProgramData\DockerDesktop\bin\docker-compose.exe"
                )
                foreach ($p in $paths) {
                    if (Test-Path $p) {
                        $composePath = $p
                        break
                    }
                }
            }

            if ($composePath) {
                Write-Host "Using Compose at: $composePath"
                & $composePath -f docker-compose.versions.yml up --build --exit-code-from downloader-ps5 downloader-ps5
            } else {
                Write-Host "docker-compose.exe not found, trying 'docker compose'..."
                docker compose -f docker-compose.versions.yml up --build --exit-code-from downloader-ps5 downloader-ps5
            }

  test-ps6:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: "Run PowerShell 6 Tests"
          command: ./run-version-tests.sh downloader-ps6

  test-ps7:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: "Run PowerShell 7 Tests"
          command: ./run-version-tests.sh downloader-ps7

workflows:
  verify:
    jobs:
      - test-ps5
      - test-ps6
      - test-ps7
