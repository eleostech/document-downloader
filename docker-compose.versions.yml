version: '3.8'

services:
  mockserver:
    build:
      context: .
      dockerfile: Dockerfile.mockserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/api/v1/documents/queued/next/empty"]
      interval: 3s
      timeout: 3s
      retries: 10

  mockserver-ps5:
    build:
      context: .
      dockerfile: Dockerfile.mockserver.ps5
    healthcheck:
      # Use PowerShell for healthcheck in Windows container, handling the 304 response correctly
      test: ["CMD", "powershell", "-ExecutionPolicy", "Bypass", "-Command", "try { $resp = Invoke-WebRequest -Uri http://127.0.0.1:5000/api/v1/documents/queued/next/empty -UseBasicParsing -ErrorAction Stop; exit 0 } catch { if ($_.Exception.Response.StatusCode -eq 304) { exit 0 } else { exit 1 } }"]
      interval: 3s
      timeout: 3s
      retries: 10

  downloader-ps6:
    build:
      context: .
      dockerfile: Dockerfile.ps6
    depends_on:
      mockserver:
        condition: service_healthy
    environment:
      - BASE_URL=http://mockserver:5000

  downloader-ps7:
    build:
      context: .
      dockerfile: Dockerfile.ps7
    depends_on:
      mockserver:
        condition: service_healthy
    environment:
      - BASE_URL=http://mockserver:5000

  downloader-ps5:
    build:
      context: .
      dockerfile: Dockerfile.ps5
    depends_on:
      mockserver-ps5:
        condition: service_healthy
    environment:
      - BASE_URL=http://mockserver-ps5:5000
