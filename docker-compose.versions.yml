version: '3.8'

services:
  mockserver:
    build:
      context: .
      dockerfile: Dockerfile.mockserver
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/api/v1/documents/queued/next/empty || powershell -ExecutionPolicy Bypass -Command \"Invoke-WebRequest -Uri http://127.0.0.1:5000/api/v1/documents/queued/next/empty -UseBasicParsing\""]
      interval: 3s
      timeout: 3s
      retries: 10

  downloader-ps6:
    build:
      context: .
      dockerfile: Dockerfile.ps6
    depends_on:
      mockserver:
        condition: service_healthy
    environment:
      - BASE_URL=http://mockserver:5000

  downloader-ps7:
    build:
      context: .
      dockerfile: Dockerfile.ps7
    depends_on:
      mockserver:
        condition: service_healthy
    environment:
      - BASE_URL=http://mockserver:5000

  downloader-ps5:
    build:
      context: .
      dockerfile: Dockerfile.ps5
    depends_on:
      mockserver:
        condition: service_healthy
    environment:
      - BASE_URL=http://mockserver:5000
