version: '3.8'

services:
  mockserver:
    build:
      context: .
      dockerfile: Dockerfile.mockserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/api/v1/documents/queued/next/empty"]
      interval: 3s
      timeout: 3s
      retries: 10

  mockserver-ps5:
    build:
      context: .
      dockerfile: Dockerfile.mockserver.ps5
    healthcheck:
      # Simple check that should be robust in PowerShell 5.1
      test: ["CMD", "powershell", "-ExecutionPolicy", "Bypass", "-Command", "Invoke-WebRequest -Uri http://127.0.0.1:5000/api/v1/documents/queued/next/empty -UseBasicParsing -ErrorAction SilentlyContinue"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  downloader-ps6:
    build:
      context: .
      dockerfile: Dockerfile.ps6
    depends_on:
      mockserver:
        condition: service_healthy
    environment:
      - BASE_URL=http://mockserver:5000

  downloader-ps7:
    build:
      context: .
      dockerfile: Dockerfile.ps7
    depends_on:
      mockserver:
        condition: service_healthy
    environment:
      - BASE_URL=http://mockserver:5000

  downloader-ps5:
    build:
      context: .
      dockerfile: Dockerfile.ps5
    depends_on:
      mockserver-ps5:
        condition: service_healthy
    environment:
      - BASE_URL=http://mockserver-ps5:5000
